<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121726" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4efe3" />

    <title>AadesiPo — The Telugu property game</title>
    <meta
      name="description"
      content="Buy Charminar, build on Jubilee Hills, and bankrupt your friends. AadesiPo is a property game for the Telugu states — play vs AI, pass-and-play, or online. No sign-up, works offline."
    />
    <link rel="canonical" href="https://aadesipo-web.vercel.app/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AadesiPo" />
    <meta property="og:title" content="AadesiPo — The Telugu property game" />
    <meta
      property="og:description"
      content="Buy Charminar, build on Jubilee Hills, and bankrupt your friends. Play vs AI, pass-and-play, or online — no sign-up, works offline."
    />
    <meta property="og:url" content="https://aadesipo-web.vercel.app/" />
    <meta property="og:image" content="https://aadesipo-web.vercel.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AadesiPo — a premium Telugu property game" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AadesiPo — The Telugu property game" />
    <meta
      name="twitter:description"
      content="Buy Charminar, build on Jubilee Hills, and bankrupt your friends. No sign-up, works offline."
    />
    <meta name="twitter:image" content="https://aadesipo-web.vercel.app/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("aadesipo-theme");
          var theme =
            stored || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
