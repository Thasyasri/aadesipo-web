name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Typecheck Edge Functions
        run: pnpm typecheck:functions

      - name: Engine tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Bundle size budget
        run: pnpm check:bundle
